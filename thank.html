<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#fff;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    max-width:400px;
}

.check{
    font-size:60px;
}

h1{
    color:#0a7d35;
    margin:15px 0;
}

p{
    color:#555;
    font-size:18px;
}

a{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#0a7d35;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
    <div class="check">✅</div>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.</p>
    <a href="index.html">Return Home</a>
</div>

</body>
</html>
